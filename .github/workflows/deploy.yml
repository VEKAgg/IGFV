name: Deploy IGFV

on:
  push:
    branches: [main]

env:
  CONTAINER_NAME: igfv
  APP_PORT: 5060
  DOMAIN: igfv.veka.gg
  NETWORK: proxy-network

jobs:
  deploy:
    name: Deploy → Production
    runs-on: [self-hosted, Linux, X64, veka]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION=$(date +%Y%m%d-%H%M%S)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # Always remove any leftover test container before we start,
      # so a previous failed run never blocks a new deployment.
      - name: Pre-flight cleanup
        run: |
          if docker ps -a --format '{{.Names}}' | grep -q "^${{ env.CONTAINER_NAME }}-test$"; then
            echo "Stale test container found -- removing before deployment"
            docker stop ${{ env.CONTAINER_NAME }}-test 2>/dev/null || true
            docker rm   ${{ env.CONTAINER_NAME }}-test 2>/dev/null || true
          fi
          docker image prune -f

      - name: Build image
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "Building image ${{ env.CONTAINER_NAME }}:$VERSION ..."
          docker build -t ${{ env.CONTAINER_NAME }}:$VERSION .

      # Run the new image in a temporary container and health-check it
      # before touching the live container. On any failure the test
      # container is always stopped and removed so nothing is left behind.
      - name: Validate image (pre-swap health check)
        id: validate
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          cleanup_test() {
            docker stop ${{ env.CONTAINER_NAME }}-test 2>/dev/null || true
            docker rm   ${{ env.CONTAINER_NAME }}-test 2>/dev/null || true
          }

          echo "Starting test container..."
          docker run -d \
            --name ${{ env.CONTAINER_NAME }}-test \
            --network ${{ env.NETWORK }} \
            -e NODE_ENV=production \
            -e ORIGIN=https://${{ env.DOMAIN }} \
            ${{ env.CONTAINER_NAME }}:$VERSION

          # Give the process a moment to crash fast if it is going to
          sleep 5

          for i in $(seq 1 12); do
            # Bail immediately if the container already died
            if ! docker ps --format '{{.Names}}' | grep -q "^${{ env.CONTAINER_NAME }}-test$"; then
              echo "Container crashed during startup"
              docker logs ${{ env.CONTAINER_NAME }}-test --tail 100 2>/dev/null || true
              cleanup_test
              exit 1
            fi

            if docker exec ${{ env.CONTAINER_NAME }}-test \
                wget -q --spider http://127.0.0.1:${{ env.APP_PORT }} 2>/dev/null; then
              echo "Health check passed on attempt $i"
              cleanup_test
              exit 0
            fi

            echo "Waiting for health check... ($i/12)"
            sleep 5
          done

          echo "Health check timed out -- aborting"
          docker logs ${{ env.CONTAINER_NAME }}-test --tail 100
          cleanup_test
          exit 1

      # Stop the live container, spin up the new one, then verify it.
      # If verification fails, emergency_rollback runs automatically.
      - name: Swap live container
        id: swap
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          echo "Stopping and removing old container..."
          docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
          docker rm   ${{ env.CONTAINER_NAME }} 2>/dev/null || true

          sleep 3

          echo "Starting new container (version $VERSION)..."
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            --network ${{ env.NETWORK }} \
            -e NODE_ENV=production \
            -e ORIGIN=https://${{ env.DOMAIN }} \
            --restart unless-stopped \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.igfv.rule=Host(\`${{ env.DOMAIN }}\`)" \
            --label "traefik.http.routers.igfv.entrypoints=websecure" \
            --label "traefik.http.routers.igfv.tls=true" \
            --label "traefik.http.routers.igfv.tls.certresolver=letsencrypt" \
            --label "traefik.http.services.igfv.loadbalancer.server.port=${{ env.APP_PORT }}" \
            --label "traefik.http.routers.igfv.middlewares=secure-headers@file" \
            --label "com.igfv.version=$VERSION" \
            ${{ env.CONTAINER_NAME }}:$VERSION

          echo "Container started (expected downtime: ~2-5 seconds)"

      - name: Verify live container
        timeout-minutes: 2
        run: |
          sleep 5

          if ! docker ps --format '{{.Names}}' | grep -q "^${{ env.CONTAINER_NAME }}$"; then
            echo "Container not running after swap"
            docker logs ${{ env.CONTAINER_NAME }} --tail 100 2>/dev/null || true
            exit 1
          fi

          for i in $(seq 1 6); do
            if ! docker ps --format '{{.Names}}' | grep -q "^${{ env.CONTAINER_NAME }}$"; then
              echo "Container crashed post-swap"
              docker logs ${{ env.CONTAINER_NAME }} --tail 100 2>/dev/null || true
              exit 1
            fi

            if docker exec ${{ env.CONTAINER_NAME }} \
                wget -q --spider http://127.0.0.1:${{ env.APP_PORT }} 2>/dev/null; then
              echo "Live container healthy"
              exit 0
            fi

            echo "Waiting... ($i/6)"
            sleep 5
          done

          # Pre-validation already passed, so a slow start is a warning,
          # not a hard failure -- but log it clearly.
          echo "WARNING: live container slow to respond; pre-validation did pass"

      # Rollback: restart the previous tagged image with full Traefik labels
      # so the site is actually reachable after rollback, not just running.
      # Must run BEFORE cleanup so the previous image is still available.
      - name: Emergency rollback
        if: failure()
        run: |
          if [ "${{ steps.swap.outcome }}" != "success" ] && [ "${{ steps.swap.outcome }}" != "failure" ]; then
            echo "Failure was pre-swap (build or validation) -- live container untouched, no rollback needed"
            exit 0
          fi

          echo "Post-swap failure detected -- attempting rollback..."

          # Clean up the failed live container if it exists
          docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
          docker rm   ${{ env.CONTAINER_NAME }} 2>/dev/null || true

          # Also clean up any stale test container that may have been left
          docker stop ${{ env.CONTAINER_NAME }}-test 2>/dev/null || true
          docker rm   ${{ env.CONTAINER_NAME }}-test 2>/dev/null || true

          # Find the second-most-recent tag (the one before this deployment)
          PREV_TAG=$(docker images ${{ env.CONTAINER_NAME }} \
            --format '{{.Tag}}' \
            | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            echo "No previous image found -- manual intervention required"
            exit 1
          fi

          echo "Rolling back to ${{ env.CONTAINER_NAME }}:$PREV_TAG ..."
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            --network ${{ env.NETWORK }} \
            -e NODE_ENV=production \
            -e ORIGIN=https://${{ env.DOMAIN }} \
            --restart unless-stopped \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.igfv.rule=Host(\`${{ env.DOMAIN }}\`)" \
            --label "traefik.http.routers.igfv.entrypoints=websecure" \
            --label "traefik.http.routers.igfv.tls=true" \
            --label "traefik.http.routers.igfv.tls.certresolver=letsencrypt" \
            --label "traefik.http.services.igfv.loadbalancer.server.port=${{ env.APP_PORT }}" \
            --label "traefik.http.routers.igfv.middlewares=secure-headers@file" \
            --label "com.igfv.version=$PREV_TAG" \
            ${{ env.CONTAINER_NAME }}:$PREV_TAG

          sleep 10

          if docker ps --format '{{.Names}}' | grep -q "^${{ env.CONTAINER_NAME }}$"; then
            echo "Rollback successful -- running $PREV_TAG"
          else
            echo "Rollback container also failed -- manual intervention required"
            docker logs ${{ env.CONTAINER_NAME }} --tail 100 2>/dev/null || true
            exit 1
          fi

      # Keep the 3 most recent images, prune the rest.
      # Runs after rollback so the previous image is still available if needed.
      - name: Cleanup old images
        if: always()
        run: |
          docker images ${{ env.CONTAINER_NAME }} \
            --format '{{.Tag}}' \
            | tail -n +4 \
            | xargs -I{} docker rmi ${{ env.CONTAINER_NAME }}:{} 2>/dev/null || true
          docker image prune -f
          docker builder prune -f

      - name: Summary
        if: always()
        run: |
          echo "========================================"
          if [ "${{ job.status }}" = "success" ]; then
            echo "DEPLOYMENT SUCCESSFUL"
            echo "Version : ${{ steps.version.outputs.VERSION }}"
            echo "URL     : https://${{ env.DOMAIN }}"
            docker ps --filter "name=${{ env.CONTAINER_NAME }}" \
              --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
          else
            echo "DEPLOYMENT FAILED"
            docker ps -a --filter "name=${{ env.CONTAINER_NAME }}"
          fi
          echo "========================================"
